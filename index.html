      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import { getDatabase, ref, push, onChildAdded, onValue, set, remove, runTransaction, query, limitToLast, orderByChild, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
      
      const app = initializeApp(${JSON.stringify(FIREBASE_CONFIG)}, "s803chat");
      const db = getDatabase(app);
      
      window._s803db = db;
      window._s803ref = ref;
      window._s803push = push;
      window._s803onChildAdded = onChildAdded;
      window._s803onValue = onValue;
      window._s803set = set;
      window._s803remove = remove;
      window._s803runTx = runTransaction;
      window._s803query = query;
      window._s803limitToLast = limitToLast;
      window._s803orderByChild = orderByChild;
      window._s803get = get;
      
      document.dispatchEvent(new Event("s803-db-ready"));
    `;
    document.head.appendChild(s);
    document.addEventListener("s803-db-ready", initChatUI, { once: true });
  }

  function initChatUI() {
    const db = window._s803db;
    const ref = window._s803ref;
    const push = window._s803push;
    const onValue = window._s803onValue;
    const set = window._s803set;
    const remove = window._s803remove;
    const runTx = window._s803runTx;
    const query = window._s803query;
    const limitToLast = window._s803limitToLast;
    const orderByChild = window._s803orderByChild;
    const getData = window._s803get;

    let myName = "", myColor = "", isAdmin = false, isMod = false, atBottom = true;
    let presenceInterval = null;
    let myTypingRef = null;
    let lastSendTime = 0;
    let lastSentText = "";

    const nameScreen = document.getElementById("s803-name-screen");
    const nameInp = document.getElementById("s803-name-inp");
    const joinBtn = document.getElementById("s803-join-btn");
    const generateBtn = document.getElementById("s803-generate-btn");
    const msgs = document.getElementById("s803-msgs");
    const msgInp = document.getElementById("s803-msginp");
    const sendBtn = document.getElementById("s803-sendbtn");
    const scrollBtn = document.getElementById("s803-scrollbtn");
    const etoggle = document.getElementById("s803-etoggle");
    const epicker = document.getElementById("s803-emoji-picker");
    const toast = document.getElementById("s803-toast");
    const onlineN = document.getElementById("s803-online-n");
    const typingIndicator = document.getElementById("s803-typing");
    const pinnedContainer = document.getElementById("s803-pinned");

    function colorFromName(n) {
      const colors = ["#e03030","#ff6b35","#f7c59f","#004e89","#1a936f","#88d498","#f18f01","#c73e1d","#44bba4","#e94f37","#52b788","#ffb703","#fb8500","#6b4226","#d4a373","#9b5de5","#f15bb5","#00bbf9","#00f5d4","#fee440"];
      let hash = 0;
      for (let ch of n) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
      return colors[hash % colors.length];
    }

    function sanitize(t) { return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function timeStr(ts) { return new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

    function hasBad(t) {
      const l = t.toLowerCase().replace(/[^a-z0-9]/g, " ");
      return PROFANITY.some(w => l.split(" ").includes(w));
    }

    function showToast(m, isError = false) {
      toast.textContent = m;
      toast.style.borderColor = isError ? '#ff4444' : '#e03030';
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function scrollDown(force) {
      if (atBottom || force) msgs.scrollTop = msgs.scrollHeight;
    }

    // Emoji picker
    EMOJIS.forEach(e => {
      const s = document.createElement("span");
      s.className = "s803-ep";
      s.textContent = e;
      s.onclick = () => { msgInp.value += e; msgInp.focus(); };
      epicker.appendChild(s);
    });

    etoggle.onclick = () => epicker.classList.toggle("open");
    document.addEventListener("click", e => {
      if (!epicker.contains(e.target) && e.target !== etoggle) epicker.classList.remove("open");
    });

    msgs.addEventListener("scroll", () => {
      atBottom = (msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight) < 80;
      scrollBtn.classList.toggle("show", !atBottom);
    });
    scrollBtn.onclick = () => scrollDown(true);

    if (generateBtn) generateBtn.onclick = () => { nameInp.value = generateUsername(); };

    const saved = localStorage.getItem("s803_chatname");
    if (saved) nameInp.value = saved; else nameInp.value = generateUsername();

    function joinChat(name) {
      name = name.trim().slice(0, 20);
      if (!name) { showToast("⚠️ Please enter a name!", true); return; }
      
      myName = name;
      myColor = colorFromName(name);
      isAdmin = name.toLowerCase() === ADMIN_NAME.toLowerCase();
      isMod = MOD_NAMES.map(m => m.toLowerCase()).includes(name.toLowerCase());
      
      nameScreen.style.display = "none";
      localStorage.setItem("s803_chatname", name);
      
      msgs.innerHTML = '';
      startListening();
      updatePresence(true);
      setupTyping();
      setupPinnedListener();
      
      push(ref(db, `chats/${CHAT_ROOM}/messages`), { type: "system", text: `${name} joined the chat`, ts: Date.now() })
        .catch(() => {});
      
      showToast(`Welcome, ${name}!`, false);
    }

    nameInp.addEventListener("keydown", e => { if (e.key === "Enter") joinBtn.click(); });
    joinBtn.onclick = () => joinChat(nameInp.value);

    function updatePresence(on) {
      const encodedName = btoa(myName).replace(/[^a-zA-Z0-9]/g, "");
      const pref = ref(db, `chats/${CHAT_ROOM}/presence/${encodedName}`);
      
      if (on) {
        set(pref, { name: myName, ts: Date.now() });
        window.addEventListener("beforeunload", () => {
          remove(pref);
          if (myTypingRef) remove(myTypingRef);
          if (presenceInterval) clearInterval(presenceInterval);
        });
        presenceInterval = setInterval(() => set(pref, { name: myName, ts: Date.now() }), 30000);
      }
      
      onValue(ref(db, `chats/${CHAT_ROOM}/presence`), snap => {
        const data = snap.val() || {};
        const now = Date.now();
        const online = Object.values(data).filter(v => now - v.ts < 90000).length;
        onlineN.textContent = online;
      });
    }

    function setupTyping() {
      if (!myName) return;
      const encodedName = btoa(myName).replace(/[^a-zA-Z0-9]/g, "");
      myTypingRef = ref(db, `chats/${CHAT_ROOM}/typing/${encodedName}`);

      onValue(ref(db, `chats/${CHAT_ROOM}/typing`), (snap) => {
        const data = snap.val() || {};
        const now = Date.now();
        const typingUsers = Object.values(data)
          .filter(v => now - (v.ts || 0) < 6000 && v.name !== myName)
          .map(v => v.name);

        if (typingUsers.length === 0) typingIndicator.textContent = '';
        else if (typingUsers.length === 1) typingIndicator.textContent = `${typingUsers[0]} is typing...`;
        else if (typingUsers.length === 2) typingIndicator.textContent = `${typingUsers[0]} and ${typingUsers[1]} are typing...`;
        else typingIndicator.textContent = `${typingUsers.length} users are typing...`;
      });

      let typingTimer = null;
      const handleTyping = () => {
        if (typingTimer) clearTimeout(typingTimer);
        set(myTypingRef, { name: myName, ts: Date.now() }).catch(() => {});
        typingTimer = setTimeout(() => { if (myTypingRef) remove(myTypingRef).catch(() => {}); }, 2800);
      };

      msgInp.addEventListener("input", handleTyping);
      msgInp.addEventListener("blur", () => {
        if (typingTimer) clearTimeout(typingTimer);
        if (myTypingRef) remove(myTypingRef).catch(() => {});
      });
    }

    function setupPinnedListener() {
      const pinnedRef = ref(db, `chats/${CHAT_ROOM}/pinned`);
      onValue(pinnedRef, (snap) => {
        const p = snap.val();
        if (!p) {
          pinnedContainer.style.display = 'none';
          return;
        }
        pinnedContainer.style.display = 'flex';
        pinnedContainer.classList.add("show");
        pinnedContainer.innerHTML = `
          <span style="color:#e03030;font-size:18px;">📌</span>
          <span style="color:${p.color || '#e03030'};font-weight:700;">${sanitize(p.name)}</span>:
          <span class="s803-pinned-txt">${sanitize(p.text)}</span>
          ${isAdmin ? `<button class="s803-unpin-btn">Unpin</button>` : ''}
        `;
        const unpinBtn = pinnedContainer.querySelector('.s803-unpin-btn');
        if (unpinBtn) {
          unpinBtn.onclick = () => {
            remove(pinnedRef).catch(() => {});
            showToast("📌 Message unpinned", false);
          };
        }
      });
    }

    // Global reaction listener (per-message)
    const msgReactionsRef = ref(db, `chats/${CHAT_ROOM}/msgReactions`);
    onValue(msgReactionsRef, (snap) => {
      const all = snap.val() || {};
      document.querySelectorAll('.s803-msg[data-key]').forEach(el => {
        const key = el.dataset.key;
        const rdata = all[key] || {};
        const reactDiv = el.querySelector('.s803-msg-reactions');
        if (reactDiv) {
          reactDiv.querySelectorAll('.s803-mr-btn').forEach(btn => {
            const i = parseInt(btn.dataset.i);
            const countEl = btn.querySelector('.rc');
            if (countEl) countEl.textContent = rdata[i] || 0;
          });
        }
      });
    });

    // Render single message with grouping support
    function renderMsg(key, data, isGrouped = false) {
      if (data.type === "system") {
        const div = document.createElement("div");
        div.className = "s803-sys";
        div.textContent = data.text;
        msgs.appendChild(div);
        scrollDown();
        return;
      }

      const color = data.color || colorFromName(data.name || "?");
      const adminMsg = (data.name || "").toLowerCase() === ADMIN_NAME.toLowerCase();
      const modMsg = MOD_NAMES.includes((data.name || "").toLowerCase());
      const canDel = isAdmin || isMod || data.name === myName;

      const item = document.createElement("div");
      item.className = "s803-msg";
      item.dataset.key = key;

      let html = '';

      if (isGrouped) {
        item.classList.add("s803-msg-grouped");
        const txtContent = sanitize(data.text || "").replace(/@([A-Za-z0-9]+)/g, '<span class="s803-mention">@$1</span>');
        html = `
          <div class="s803-mb">
            <div class="s803-txt">${txtContent}</div>
          </div>
          ${canDel ? `<button class="s803-del" title="Delete">✕</button>` : ''}
        `;
      } else {
        const txtContent = sanitize(data.text || "").replace(/@([A-Za-z0-9]+)/g, '<span class="s803-mention">@$1</span>');
        html = `
          <div class="s803-av" style="background:${color}">${(data.name || "?")[0].toUpperCase()}</div>
          <div class="s803-mb">
            <div class="s803-meta">
              <span class="s803-uname" style="color:${color}">${sanitize(data.name || "?")}</span>
              ${adminMsg ? '<span class="s803-badge-admin">ADMIN</span>' : ''}
              ${modMsg ? '<span class="s803-badge-mod">MOD</span>' : ''}
              <span class="s803-time">${timeStr(data.ts)}</span>
            </div>
            <div class="s803-txt">${txtContent}</div>
          </div>
          ${canDel ? `<button class="s803-del" title="Delete">✕</button>` : ''}
          ${isAdmin && data.type !== "system" ? `<button class="s803-pin-btn" title="Pin message">📌</button>` : ''}
        `;
      }

      item.innerHTML = html;

      // Delete button
      const delBtn = item.querySelector('.s803-del');
      if (delBtn) {
        delBtn.onclick = (e) => {
          e.stopImmediatePropagation();
          if (confirm("Delete this message?")) remove(ref(db, `chats/${CHAT_ROOM}/messages/${key}`));
        };
      }

      // Pin button (admin only)
      const pinBtn = item.querySelector('.s803-pin-btn');
      if (pinBtn) {
        pinBtn.onclick = (e) => {
          e.stopImmediatePropagation();
          pinMessage(key);
        };
      }

      // Username @mention click
      if (!isGrouped) {
        const unameEl = item.querySelector('.s803-uname');
        if (unameEl) {
          unameEl.onclick = (e) => {
            e.stopImmediatePropagation();
            const mention = `@${data.name} `;
            if (!msgInp.value.trim().startsWith(mention)) {
              msgInp.value = mention + msgInp.value;
            }
            msgInp.focus();
          };
        }
      }

      // Per-message reactions
      if (data.type !== "system") {
        const reactContainer = document.createElement("div");
        reactContainer.className = "s803-msg-reactions";
        reactContainer.innerHTML = REACTIONS.map((e, i) => `
          <button class="s803-mr-btn" data-i="${i}">
            <span class="re">${e}</span>
            <span class="rc">0</span>
          </button>
        `).join("");
        item.appendChild(reactContainer);

        reactContainer.querySelectorAll(".s803-mr-btn").forEach(btn => {
          btn.onclick = (ev) => {
            ev.stopImmediatePropagation();
            if (!myName) { showToast("Join chat first!", true); return; }
            const i = parseInt(btn.dataset.i);
            runTx(ref(db, `chats/${CHAT_ROOM}/msgReactions/${key}/${i}`), cur => (cur || 0) + 1);
            btn.classList.add("popped");
            setTimeout(() => btn.classList.remove("popped"), 400);
          };
        });
      }

      msgs.appendChild(item);
      
      // Limit history
      const allMsgs = msgs.querySelectorAll(".s803-msg:not(.s803-sys)");
      if (allMsgs.length > MAX_MSGS) allMsgs[0].remove();
      
      scrollDown();
    }

    function pinMessage(key) {
      if (!isAdmin) return;
      getData(ref(db, `chats/${CHAT_ROOM}/messages/${key}`)).then(snap => {
        const msgData = snap.val();
        if (msgData) {
          set(ref(db, `chats/${CHAT_ROOM}/pinned`), {
            ...msgData,
            pinnedBy: myName,
            pinnedAt: Date.now()
          }).then(() => showToast("📌 Message pinned for everyone!", false))
            .catch(() => showToast("❌ Failed to pin", true));
        }
      }).catch(() => showToast("❌ Could not load message to pin", true));
    }

    function startListening() {
      const messagesRef = ref(db, `chats/${CHAT_ROOM}/messages`);
      const recentQuery = query(messagesRef, orderByChild('ts'), limitToLast(50));

      onValue(recentQuery, (snapshot) => {
        msgs.innerHTML = '';
        const messages = [];
        snapshot.forEach(child => messages.push({ key: child.key, data: child.val() }));
        messages.sort((a, b) => (a.data.ts || 0) - (b.data.ts || 0));

        let lastUser = null;
        let lastTs = 0;

        messages.forEach(({ key, data }) => {
          const isGrouped = (data.name === lastUser && data.ts && lastTs && (data.ts - lastTs < GROUP_TIME_MS));
          renderMsg(key, data, isGrouped);
          if (data.name) {
            lastUser = data.name;
            lastTs = data.ts;
          }
        });

        setTimeout(() => scrollDown(true), 80);
      });
    }

    async function sendMsg() {
      const text = msgInp.value.trim();
      
      if (!myName) { showToast("⚠️ Please join the chat first!", true); return; }
      if (!text) { showToast("⚠️ Type something!", true); return; }

      const now = Date.now();
      if (now - lastSendTime < SPAM_COOLDOWN_MS) {
        showToast("⏳ Slow down – anti-spam protection", true);
        return;
      }
      if (text === lastSentText && now - lastSendTime < 15000) {
        showToast("🚫 Duplicate message blocked", true);
        return;
      }

      if (hasBad(text)) {
        showToast("🚫 Keep it friendly please!", true);
        return;
      }

      // Admin commands
      if (text.startsWith('/') && isAdmin) {
        const cmd = text.slice(1).trim();
        if (cmd === 'clear') {
          if (confirm('🧹 Clear ALL chat history?')) {
            remove(ref(db, `chats/${CHAT_ROOM}/messages`))
              .then(() => showToast('✅ Chat cleared!', false));
          }
          msgInp.value = '';
          return;
        }
      }

      sendBtn.disabled = true;
      
      try {
        await push(ref(db, `chats/${CHAT_ROOM}/messages`), {
          name: myName,
          color: myColor,
          text: text,
          ts: Date.now()
        });
        
        lastSendTime = now;
        lastSentText = text;
        
        msgInp.value = "";
        msgInp.style.height = "auto";
        scrollDown(true);
        msgInp.focus();
      } catch (error) {
        console.error(error);
        showToast("❌ Failed to send – check connection", true);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.onclick = sendMsg;
    msgInp.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
      }
    });
    msgInp.addEventListener("input", () => {
      msgInp.style.height = "auto";
      msgInp.style.height = Math.min(msgInp.scrollHeight, 80) + "px";
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", mountLayout);
  } else {
    setTimeout(mountLayout, 200);
  }
})();
</script>
