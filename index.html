<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports 803 · Thumbnail Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #070809;
      color: #eef0f7;
      font-family: 'Segoe UI', 'Syne', system-ui, -apple-system, sans-serif;
      padding: 24px;
      line-height: 1.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    h1 span {
      color: #e63946;
    }
    .sub {
      color: #6b738a;
      margin-bottom: 24px;
      border-left: 3px solid #e63946;
      padding-left: 12px;
    }

    /* Layout */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card {
      background: #0e1015;
      border: 1px solid #232738;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a9bb5;
      border-bottom: 1px solid #232738;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    /* Form elements */
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9aa0b8;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      background: #141720;
      border: 1px solid #232738;
      border-radius: 6px;
      padding: 8px 12px;
      color: #eef0f7;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #00d4ff;
    }
    input[type="color"] {
      height: 38px;
      padding: 4px;
    }
    button {
      background: #1b1f2c;
      border: 1px solid #2e3347;
      border-radius: 6px;
      padding: 8px 16px;
      color: #eef0f7;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: #00d4ff;
      border-color: #00d4ff;
      color: #070809;
    }
    .btn-primary {
      background: #e63946;
      border-color: #e63946;
    }
    .btn-primary:hover {
      background: #c1121f;
    }

    .flex {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .flex button {
      flex: 1;
    }

    .preview-area {
      background: #0e1015;
      border: 1px solid #232738;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      padding: 12px;
    }
    canvas {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .url-box {
      background: #141720;
      border-radius: 6px;
      padding: 8px;
      font-size: 0.7rem;
      word-break: break-all;
      margin-top: 12px;
    }

    .api-key-note {
      font-size: 0.7rem;
      color: #6b738a;
      margin-top: 6px;
    }
    a {
      color: #00d4ff;
      text-decoration: none;
    }
    hr {
      border-color: #232738;
      margin: 16px 0;
    }
    .badge {
      display: inline-block;
      background: #1f2a3e;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #8a9bb5;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Sports <span>803</span> · Thumbnail Generator</h1>
  <div class="sub">Create custom match or race thumbnails for your posts – free, no watermark.</div>

  <div class="grid">
    <!-- Left: Controls -->
    <div>
      <div class="card">
        <div class="card-title">Event Type</div>
        <div class="form-group">
          <label>Type</label>
          <select id="type">
            <option value="match">🏆 Match (two teams)</option>
            <option value="race">🏎️ Race (single event)</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Details</div>
        <div id="match-fields">
          <div class="form-group">
            <label>Home Team / Event Name</label>
            <input type="text" id="home" placeholder="e.g. Manchester City" value="Manchester City">
          </div>
          <div class="form-group">
            <label>Away Team</label>
            <input type="text" id="away" placeholder="e.g. Arsenal" value="Arsenal">
          </div>
        </div>
        <div id="race-fields" style="display: none;">
          <div class="form-group">
            <label>Race Name</label>
            <input type="text" id="race-name" placeholder="e.g. Monaco Grand Prix" value="Monaco Grand Prix">
          </div>
        </div>
        <div class="form-group">
          <label>League / Series</label>
          <input type="text" id="league" placeholder="Premier League / Formula 1" value="Premier League">
        </div>
        <div class="form-group">
          <label>Date & Time (optional)</label>
          <input type="text" id="datetime" placeholder="Sun 23 Mar · 15:00 GMT">
        </div>
      </div>

      <div class="card">
        <div class="card-title">Logos & Visuals</div>
        <div id="match-logos">
          <div class="form-group">
            <label>Home Logo URL</label>
            <input type="text" id="home-logo" placeholder="https://... or leave blank to auto‑fetch">
          </div>
          <div class="form-group">
            <label>Away Logo URL</label>
            <input type="text" id="away-logo" placeholder="https://... or leave blank to auto‑fetch">
          </div>
        </div>
        <div id="race-logos" style="display: none;">
          <div class="form-group">
            <label>Event Banner / Circuit Image (optional)</label>
            <input type="text" id="banner" placeholder="https://...">
          </div>
        </div>
        <div class="form-group">
          <label>Background Color 1 (start)</label>
          <input type="color" id="bg1" value="#0d1b2a">
        </div>
        <div class="form-group">
          <label>Background Color 2 (end)</label>
          <input type="color" id="bg2" value="#1a0020">
        </div>
        <div class="form-group">
          <label>Aspect Ratio</label>
          <select id="aspect">
            <option value="16:9">Blog / YouTube (16:9)</option>
            <option value="1:1">Social Square (1:1)</option>
            <option value="9:16">Stories / Reels (9:16)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Quality (width)</label>
          <select id="quality">
            <option value="800">Standard (800px width)</option>
            <option value="1200">HD (1200px width)</option>
            <option value="1600">4K (1600px width)</option>
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🔑 imgbb API Key</div>
        <div class="form-group">
          <input type="text" id="imgbb-key" placeholder="Paste your imgbb API key here">
          <div class="api-key-note">Get a free key at <a href="https://api.imgbb.com" target="_blank">api.imgbb.com</a> – saved in your browser.</div>
        </div>
        <button id="save-key" style="width: auto;">💾 Save Key</button>
      </div>

      <div class="card">
        <div class="card-title">Actions</div>
        <div class="flex">
          <button id="generate" class="btn-primary">🎨 Generate Thumbnail</button>
          <button id="upload">☁️ Upload to imgbb</button>
          <button id="download">⬇️ Download JPEG</button>
          <button id="copy-url">📋 Copy URL</button>
          <button id="copy-html">📝 Copy HTML</button>
        </div>
        <div class="url-box" id="thumb-url-display">No thumbnail generated yet.</div>
      </div>
    </div>

    <!-- Right: Preview -->
    <div>
      <div class="card preview-area">
        <div class="card-title">Preview</div>
        <canvas id="thumb-canvas" width="800" height="450" style="max-width:100%; height:auto; background:#111; border-radius:8px;"></canvas>
        <div class="flex" style="margin-top: 12px;">
          <button id="refresh-preview" style="flex:1;">↻ Refresh Preview</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // -------------------------------------------------------------
  // Helper drawing functions (adapted from v5.5)
  // -------------------------------------------------------------
  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawS803Badge(ctx, W, H, scale) {
    const pad = Math.round(12 * scale);
    const bw = Math.round(130 * scale);
    const bh = Math.round(32 * scale);
    const x = W - bw - pad;
    const y = pad;
    ctx.save();
    ctx.globalAlpha = 0.95;
    ctx.fillStyle = 'rgba(0,0,0,.85)';
    roundRect(ctx, x, y, bw, bh, 5);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.arc(x + 11 * scale, y + bh / 2, 4 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `900 ${Math.round(13 * scale)}px "Barlow Condensed",sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPORTS', x + 19 * scale, y + bh / 2);
    ctx.fillStyle = '#39ff14';
    ctx.fillText(' 803', x + 19 * scale + ctx.measureText('SPORTS').width, y + bh / 2);
    ctx.restore();
  }

  function wrapText(ctx, text, x, y, maxWidth, fontSize) {
    if (!text) return;
    const words = text.split(' ');
    let line = '';
    const lines = [];
    for (let w of words) {
      const testLine = line ? line + ' ' + w : w;
      if (ctx.measureText(testLine).width > maxWidth && line) {
        lines.push(line);
        line = w;
      } else {
        line = testLine;
      }
    }
    lines.push(line);
    lines.slice(0, 2).forEach((l, i) => ctx.fillText(l, x, y + i * (fontSize + 4)));
  }

  async function loadImageCORS(url, fallbackName) {
    if (!url) return null;
    const tryLoad = (src) => new Promise(resolve => {
      if (!src) return resolve(null);
      const img = new Image();
      img.crossOrigin = 'anonymous';
      const t = setTimeout(() => resolve(null), 6000);
      img.onload = () => { clearTimeout(t); resolve(img); };
      img.onerror = () => { clearTimeout(t); resolve(null); };
      img.src = src;
    });
    let img = await tryLoad(url);
    if (!img && url.startsWith('http')) {
      const proxy = `https://wsrv.nl/?url=${encodeURIComponent(url)}&w=300&h=300&fit=contain&n=-1`;
      img = await tryLoad(proxy);
    }
    if (!img && fallbackName) {
      const tsdbUrl = await fetchLogoFromTSDB(fallbackName);
      if (tsdbUrl) {
        img = await tryLoad(tsdbUrl);
        if (!img) img = await tryLoad(`https://wsrv.nl/?url=${encodeURIComponent(tsdbUrl)}&w=300&h=300&fit=contain&n=-1`);
      }
    }
    return img;
  }

  async function fetchLogoFromTSDB(teamName) {
    if (!teamName) return null;
    try {
      const res = await fetch(`https://www.thesportsdb.com/api/v1/json/3/searchteams.php?t=${encodeURIComponent(teamName)}`);
      const data = await res.json();
      return data.teams?.[0]?.strTeamBadge || data.teams?.[0]?.strBadge || null;
    } catch(e) { return null; }
  }

  async function drawMatchThumb(canvas, opts) {
    const { home, away, hLogo, aLogo, league, datetime, bg1, bg2 } = opts;
    const W = canvas.width, H = canvas.height, cx = W/2, cy = H/2, scale = W / 800;
    const ctx = canvas.getContext('2d');
    const [hImg, aImg] = await Promise.all([
      loadImageCORS(hLogo, home),
      loadImageCORS(aLogo, away)
    ]);

    ctx.clearRect(0,0,W,H);

    ctx.fillStyle = bg1;
    ctx.fillRect(0, 0, cx + 8*scale, H);
    ctx.fillStyle = bg2;
    ctx.fillRect(cx - 8*scale, 0, W, H);

    const blend = ctx.createLinearGradient(cx - 60*scale, 0, cx + 60*scale, 0);
    blend.addColorStop(0, bg1);
    blend.addColorStop(0.5, 'rgba(0,0,0,0.6)');
    blend.addColorStop(1, bg2);
    ctx.fillStyle = blend;
    ctx.fillRect(cx - 60*scale, 0, 120*scale, H);

    const vig = ctx.createRadialGradient(cx, cy, H*0.05, cx, cy, H*0.9);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = vig;
    ctx.fillRect(0,0,W,H);

    if (league) {
      const fs = Math.round(13*scale);
      ctx.font = `700 ${fs}px "Barlow Condensed",sans-serif`;
      const w = ctx.measureText(league).width + 24*scale;
      const h = fs + 14*scale;
      ctx.save();
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#080c14';
      roundRect(ctx, cx - w/2, Math.round(16*scale), w, h, h/2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(league, cx, 16*scale + h/2);
      ctx.restore();
    }

    const r = Math.round(105*scale);
    const hx = Math.round(W*0.255);
    const ax = Math.round(W*0.745);
    const cyLogo = Math.round(H*0.42);

    function drawLogo(img, cx, cy, r) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r+3*scale, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2*scale;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.fill();
      ctx.clip();
      if (img) {
        ctx.shadowColor = 'rgba(255,255,255,0.15)';
        ctx.shadowBlur = 10*scale;
        ctx.drawImage(img, cx - r*0.85, cy - r*0.85, r*1.7, r*1.7);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fill();
      }
      ctx.restore();
    }
    drawLogo(hImg, hx, cyLogo, r);
    drawLogo(aImg, ax, cyLogo, r);

    const vsR = Math.round(28*scale);
    ctx.save();
    ctx.shadowColor = '#e63946';
    ctx.shadowBlur = 24*scale;
    ctx.fillStyle = '#e63946';
    ctx.beginPath();
    ctx.arc(cx, cyLogo, vsR, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = `900 ${Math.round(15*scale)}px "Barlow Condensed",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('VS', cx, cyLogo);
    ctx.restore();

    const nameY = cyLogo + r + Math.round(18*scale);
    const nameFs = Math.round(21*scale);
    ctx.font = `800 ${nameFs}px "Barlow Condensed",sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.95)';
    ctx.shadowBlur = 12*scale;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    wrapText(ctx, home, hx, nameY, W*0.38, nameFs);
    wrapText(ctx, away, ax, nameY, W*0.38, nameFs);
    ctx.shadowBlur = 0;

    if (datetime) {
      const dtFs = Math.round(13*scale);
      ctx.font = `600 ${dtFs}px "Barlow Condensed",sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = 8;
      ctx.fillText('🕐  ' + datetime, cx, H - Math.round(16*scale));
      ctx.shadowBlur = 0;
    }

    ctx.save();
    ctx.globalAlpha = 0.92;
    const stripe = ctx.createLinearGradient(0, H - Math.round(36*scale), W, H);
    stripe.addColorStop(0, '#e63946');
    stripe.addColorStop(1, '#c1121f');
    ctx.fillStyle = stripe;
    ctx.fillRect(0, H - Math.round(36*scale), W, Math.round(36*scale));
    ctx.restore();
    ctx.font = `800 ${Math.round(13*scale)}px "Barlow Condensed",sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('▶  WATCH FREE ON SPORTS 803', cx, H - Math.round(18*scale));

    drawS803Badge(ctx, W, H, scale);
  }

  async function drawRaceThumb(canvas, opts) {
    const { name, league, datetime, venue, bg1, bg2, bannerUrl } = opts;
    const W = canvas.width, H = canvas.height, cx = W/2, scale = W/800;
    const ctx = canvas.getContext('2d');
    let bannerImg = null;
    if (bannerUrl) bannerImg = await loadImageCORS(bannerUrl, name);

    ctx.clearRect(0,0,W,H);
    const grad = ctx.createLinearGradient(0,0,W,H);
    grad.addColorStop(0, bg1);
    grad.addColorStop(1, bg2);
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    if (bannerImg) {
      const iW = W*0.62, iH = H, iX = W - iW;
      ctx.save();
      ctx.globalAlpha = 0.45;
      const ir = Math.max(iW / bannerImg.width, iH / bannerImg.height);
      ctx.drawImage(bannerImg, iX + (iW - bannerImg.width*ir)/2, (iH - bannerImg.height*ir)/2, bannerImg.width*ir, bannerImg.height*ir);
      ctx.restore();
      const fade = ctx.createLinearGradient(iX,0,W,0);
      fade.addColorStop(0, bg1);
      fade.addColorStop(0.5, 'rgba(10,14,26,0)');
      fade.addColorStop(1, 'rgba(10,14,26,0.3)');
      ctx.fillStyle = fade;
      ctx.fillRect(0,0,W,H);
    }

    // Left accent bar
    const bar = ctx.createLinearGradient(0,0,0,H);
    bar.addColorStop(0, '#e63946');
    bar.addColorStop(1, '#f4a261');
    ctx.fillStyle = bar;
    ctx.fillRect(Math.round(28*scale), Math.round(H*0.1), Math.round(5*scale), Math.round(H*0.8));

    // League pill
    const lgFs = Math.round(13*scale);
    ctx.font = `700 ${lgFs}px "Barlow Condensed",sans-serif`;
    const lgText = league || 'Motorsport';
    const lgW = ctx.measureText(lgText).width + 22*scale;
    const lgH = lgFs + 14*scale;
    const lgX = Math.round(42*scale), lgY = Math.round(20*scale);
    ctx.save();
    ctx.globalAlpha = 0.92;
    ctx.fillStyle = '#e63946';
    roundRect(ctx, lgX, lgY, lgW, lgH, 4);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(lgText, lgX + 10*scale, lgY + lgH/2);
    ctx.restore();

    // Event name
    const titleFs = Math.round(32*scale);
    ctx.font = `900 ${titleFs}px "Barlow Condensed",sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.shadowColor = 'rgba(0,0,0,0.95)';
    ctx.shadowBlur = 18;
    const words = (name || 'Race Event').split(' ');
    let lines = [], line = '';
    const maxTW = W*0.52;
    for (let w of words) {
      const test = line ? line + ' ' + w : w;
      if (ctx.measureText(test).width > maxTW && line) {
        lines.push(line);
        line = w;
      } else line = test;
    }
    lines.push(line);
    const startY = Math.round(H*0.28);
    lines.slice(0,3).forEach((l,i) => ctx.fillText(l, Math.round(42*scale), startY + i*(titleFs+5*scale)));
    ctx.shadowBlur = 0;

    if (venue) {
      ctx.font = `400 ${Math.round(14*scale)}px "Barlow",sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.textBaseline = 'top';
      ctx.fillText('📍 ' + venue, Math.round(42*scale), startY + lines.length*(titleFs+5*scale)+8*scale);
    }
    if (datetime) {
      ctx.font = `700 ${Math.round(16*scale)}px "Barlow Condensed",sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.9)';
      ctx.shadowBlur = 8;
      ctx.fillText('🕐  ' + datetime, Math.round(42*scale), Math.round(H*0.7));
      ctx.shadowBlur = 0;
    }

    const bH = Math.round(44*scale);
    ctx.save();
    ctx.globalAlpha = 0.94;
    const botG = ctx.createLinearGradient(0, H-bH, W, H);
    botG.addColorStop(0, '#e63946');
    botG.addColorStop(1, '#c1121f');
    ctx.fillStyle = botG;
    ctx.fillRect(0, H-bH, W, bH);
    ctx.restore();
    ctx.font = `800 ${Math.round(15*scale)}px "Barlow Condensed",sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('▶  WATCH FREE ON SPORTS 803', cx, H - bH/2);

    drawS803Badge(ctx, W, H, scale);
  }

  // -------------------------------------------------------------
  // Main generation function
  // -------------------------------------------------------------
  async function generateThumbnail() {
    const type = document.getElementById('type').value;
    const quality = parseInt(document.getElementById('quality').value);
    const aspect = document.getElementById('aspect').value;
    const canvas = document.getElementById('thumb-canvas');
    const ratios = { '16:9': 0.5625, '1:1': 1, '9:16': 1.778 };
    canvas.width = aspect === '9:16' ? Math.round(quality * 0.5625) : quality;
    canvas.height = Math.round(canvas.width * ratios[aspect]);

    const league = document.getElementById('league').value;
    const datetime = document.getElementById('datetime').value;
    const bg1 = document.getElementById('bg1').value;
    const bg2 = document.getElementById('bg2').value;

    if (type === 'match') {
      const home = document.getElementById('home').value;
      const away = document.getElementById('away').value;
      let hLogo = document.getElementById('home-logo').value.trim();
      let aLogo = document.getElementById('away-logo').value.trim();

      // Auto‑fetch if fields empty
      if (!hLogo && home) {
        const fetched = await fetchLogoFromTSDB(home);
        if (fetched) {
          hLogo = fetched;
          document.getElementById('home-logo').value = hLogo;
        }
      }
      if (!aLogo && away) {
        const fetched = await fetchLogoFromTSDB(away);
        if (fetched) {
          aLogo = fetched;
          document.getElementById('away-logo').value = aLogo;
        }
      }

      await drawMatchThumb(canvas, { home, away, hLogo, aLogo, league, datetime, bg1, bg2 });
    } else {
      const name = document.getElementById('race-name').value;
      const banner = document.getElementById('banner').value.trim();
      await drawRaceThumb(canvas, { name, league, datetime, venue: '', bg1, bg2, bannerUrl: banner });
    }
  }

  // -------------------------------------------------------------
  // Imgbb upload
  // -------------------------------------------------------------
  let savedKey = localStorage.getItem('s803_imgbb_key') || '';
  if (savedKey) document.getElementById('imgbb-key').value = savedKey;

  document.getElementById('save-key').onclick = () => {
    const key = document.getElementById('imgbb-key').value.trim();
    if (key) {
      localStorage.setItem('s803_imgbb_key', key);
      alert('API key saved.');
    } else {
      alert('Please enter a key.');
    }
  };

  async function uploadToImgbb() {
    const canvas = document.getElementById('thumb-canvas');
    const key = document.getElementById('imgbb-key').value.trim();
    if (!key) {
      alert('Please enter and save your imgbb API key first.');
      return;
    }
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const formData = new FormData();
    formData.append('key', key);
    formData.append('image', dataUrl.split(',')[1]);
    try {
      const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
      const json = await res.json();
      if (json.success) {
        const url = json.data.url;
        document.getElementById('thumb-url-display').innerHTML = `<strong>URL:</strong> <a href="${url}" target="_blank">${url}</a>`;
        navigator.clipboard.writeText(url);
        alert('Uploaded and URL copied to clipboard!');
      } else {
        alert('Upload failed: ' + (json.error?.message || 'Unknown error'));
      }
    } catch(e) {
      alert('Network error: ' + e.message);
    }
  }

  function downloadThumb() {
    const canvas = document.getElementById('thumb-canvas');
    const link = document.createElement('a');
    link.download = 'sports803-thumb.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
  }

  function copyUrl() {
    const urlDiv = document.getElementById('thumb-url-display');
    const urlMatch = urlDiv.innerText.match(/https?:\/\/[^\s]+/);
    if (urlMatch) {
      navigator.clipboard.writeText(urlMatch[0]);
      alert('URL copied to clipboard!');
    } else {
      alert('No URL available. Upload first.');
    }
  }

  function copyHtml() {
    const canvas = document.getElementById('thumb-canvas');
    const url = canvas.toDataURL('image/jpeg', 0.9);
    const title = document.getElementById('type').value === 'match' 
      ? `${document.getElementById('home').value} vs ${document.getElementById('away').value}`
      : document.getElementById('race-name').value;
    const html = `<div><img src="${url}" alt="${title}" style="max-width:100%;height:auto;border-radius:8px;"></div>`;
    navigator.clipboard.writeText(html);
    alert('HTML code for image copied to clipboard (base64 inline).');
  }

  // -------------------------------------------------------------
  // Event listeners
  // -------------------------------------------------------------
  document.getElementById('generate').onclick = () => generateThumbnail();
  document.getElementById('upload').onclick = () => uploadToImgbb();
  document.getElementById('download').onclick = () => downloadThumb();
  document.getElementById('copy-url').onclick = () => copyUrl();
  document.getElementById('copy-html').onclick = () => copyHtml();
  document.getElementById('refresh-preview').onclick = () => generateThumbnail();

  // Toggle fields based on type
  function toggleFields() {
    const type = document.getElementById('type').value;
    document.getElementById('match-fields').style.display = type === 'match' ? 'block' : 'none';
    document.getElementById('race-fields').style.display = type === 'race' ? 'block' : 'none';
    document.getElementById('match-logos').style.display = type === 'match' ? 'block' : 'none';
    document.getElementById('race-logos').style.display = type === 'race' ? 'block' : 'none';
    generateThumbnail();
  }
  document.getElementById('type').addEventListener('change', toggleFields);
  document.getElementById('quality').addEventListener('change', generateThumbnail);
  document.getElementById('aspect').addEventListener('change', generateThumbnail);
  document.getElementById('home').addEventListener('input', generateThumbnail);
  document.getElementById('away').addEventListener('input', generateThumbnail);
  document.getElementById('home-logo').addEventListener('input', generateThumbnail);
  document.getElementById('away-logo').addEventListener('input', generateThumbnail);
  document.getElementById('race-name').addEventListener('input', generateThumbnail);
  document.getElementById('banner').addEventListener('input', generateThumbnail);
  document.getElementById('league').addEventListener('input', generateThumbnail);
  document.getElementById('datetime').addEventListener('input', generateThumbnail);
  document.getElementById('bg1').addEventListener('input', generateThumbnail);
  document.getElementById('bg2').addEventListener('input', generateThumbnail);

  // Initial generation
  toggleFields();
  generateThumbnail();
</script>
</body>
</html>
